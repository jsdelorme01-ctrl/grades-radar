<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Grades Radar</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background-color: #111111; /* 🔥 CHANGE THIS COLOR */
  }

  #chart {
    width: 100vw;
    height: 100vh;
  }
</style>

</head>
<body>

<div id="chart"></div>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQa8Fy_R1PkzQFQw18xtwyB52qyBG5kLpz21CHdTDL5oJpDVcXuNSURvY9_pmphs2gC7mucEU_wpDde/pub?output=csv")
  .then(response => response.text())
  .then(data => {

    const rows = data.trim().split("\n").map(r => r.split(","));
    const dataRows = rows.slice(1);

    const categories = dataRows.map(r => r[0]);
    const values = dataRows.map(r => Number(r[1]));

    var options = {
      series: [{
        name: "Résultat (%)",
        data: values
      }],
      chart: {
        type: 'radar',
        height: '100%',
        background: 'transparent'
      },
      xaxis: {
        categories: categories,
        labels: {
          style: {
            colors: "#ffffff"  /* change text color here */
          }
        }
      },
      yaxis: {
        min: 0,
        max: 100,
        labels: {
          style: {
            colors: "#ffffff"
          }
        }
      },
      stroke: {
        width: 3
      },
      fill: {
        opacity: 0.3
      },
      markers: {
        size: 5
      }
    };

    var chart = new ApexCharts(document.querySelector("#chart"), options);
    chart.render();
  });
</script>

</body>
</html>
