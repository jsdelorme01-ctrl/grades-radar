<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Grades Radar</title>
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
</head>
<body>

<h2>My Grades</h2>
<div id="chart"></div>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQa8Fy_R1PkzQFQw18xtwyB52qyBG5kLpz21CHdTDL5oJpDVcXuNSURvY9_pmphs2gC7mucEU_wpDde/pubhtml")
  .then(response => response.text())
  .then(data => {

    const rows = data.trim().split("\n").map(r => r.split(","));

    // Remove header row
    const dataRows = rows.slice(1);

    const categories = dataRows.map(r => r[0]);
    const values = dataRows.map(r => Number(r[1]));

    var options = {
      series: [{
        name: "Résultat (%)",
        data: values
      }],
      chart: {
        height: 450,
        type: 'radar'
      },
      xaxis: {
        categories: categories
      },
      yaxis: {
        min: 0,
        max: 100
      }
    };

    var chart = new ApexCharts(document.querySelector("#chart"), options);
    chart.render();
  });
</script>

</body>
</html>
