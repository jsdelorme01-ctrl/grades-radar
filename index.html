<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grades Radar</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #191919;
    width: 100%;
    height: 100%;
    display: flex;
    font-family: Inter, sans-serif;
  }

  #chart {
    flex: 1;
  }

  .center-metric {
    position: absolute;
    color: #ffffff;
    font-size: 28px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }

  .center-sub {
    font-size: 13px;
    color: #a3a3a3;
    font-weight: 400;
  }
</style>
</head>

<body>

<div id="chart"></div>
<div class="center-metric" id="avgDisplay"></div>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQa8Fy_R1PkzQFQw18xtwyB52qyBG5kLpz21CHdTDL5oJpDVcXuNSURvY9_pmphs2gC7mucEU_wpDde/pub?output=csv&t=" + new Date().getTime())
  .then(response => response.text())
  .then(data => {

    const rows = data.trim().split("\n").map(r => r.split(","));
    const dataRows = rows.slice(1);

    const categories = dataRows.map(r => r[0]);
    const values = dataRows.map(r => Number(r[1]));

    const avg = (values.reduce((a,b) => a+b, 0) / values.length).toFixed(1);

    document.getElementById("avgDisplay").innerHTML = `
      ${avg}%
      <div class="center-sub">Average</div>
    `;

    let mainColor = "#ff2bd6";
    if (avg >= 90) mainColor = "#22c55e";
    else if (avg >= 75) mainColor = "#f59e0b";
    else mainColor = "#ef4444";

    var options = {
      series: [{
        name: "Grades",
        data: values
      }],
      chart: {
        type: 'radar',
        height: '100%',
        background: 'transparent',
        toolbar: { show: false }
      },
      stroke: {
        width: 3,
        colors: [mainColor]
      },
      fill: {
        type: 'gradient',
        gradient: {
          shade: 'dark',
          type: 'vertical',
          shadeIntensity: 0.4,
          gradientToColors: [mainColor],
          opacityFrom: 0.6,
          opacityTo: 0.25
        }
      },
      markers: {
        size: 6,
        colors: ['#ffffff'],
        strokeColor: mainColor,
        strokeWidth: 3
      },
      xaxis: {
        categories: categories,
        labels: {
          style: {
            colors: "#e5e5e5",
            fontSize: "16px"
          }
        }
      },
      yaxis: {
        min: 0,
        max: 100,
        tickAmount: 5,
        labels: {
          style: {
            colors: "#555555"
          }
        }
      },
      grid: {
        borderColor: "#2a2a2a"
      },
      plotOptions: {
        radar: {
          polygons: {
            strokeColors: "#333333",
            connectorColors: "#333333"
          }
        }
      }
    };

    var chart = new ApexCharts(document.querySelector("#chart"), options);
    chart.render();

    setTimeout(() => {
      window.location.reload();
    }, 15000);

  });
</script>

</body>
</html>
