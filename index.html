<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grades Radar</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #191919;
    width: 100%;
    height: 100%;
    display: flex;
    font-family: Inter, sans-serif;
  }

  #chart {
    flex: 1;
  }

  /* ===== Center Average ===== */
  .center-metric {
    position: absolute;
    color: #ffffff;
    font-size: 28px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }

  .center-sub {
    font-size: 13px;
    color: #a3a3a3;
    font-weight: 400;
  }

  /* ===== Top Left Buttons ===== */
  .color-switcher {
    position: absolute;
    top: 18px;
    left: 18px;
    display: flex;
    gap: 10px;
    z-index: 10;
  }

  .color-btn {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid #333;
    transition: transform 0.2s ease;
  }

  .color-btn:hover {
    transform: scale(1.15);
  }

  .green { background: #22c55e; }
  .red { background: #ef4444; }
  .purple { background: #ff2bd6; }

</style>
</head>

<body>

<div class="color-switcher">
  <div class="color-btn green" onclick="changeColor('#22c55e')"></div>
  <div class="color-btn red" onclick="changeColor('#ef4444')"></div>
  <div class="color-btn purple" onclick="changeColor('#ff2bd6')"></div>
</div>

<div id="chart"></div>
<div class="center-metric" id="avgDisplay"></div>

<script>
let chart;
let currentColor = "#22c55e";

fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQa8Fy_R1PkzQFQw18xtwyB52qyBG5kLpz21CHdTDL5oJpDVcXuNSURvY9_pmphs2gC7mucEU_wpDde/pub?output=csv&t=" + new Date().getTime())
  .then(response => response.text())
  .then(data => {

    const rows = data.trim().split("\n").map(r => r.split(","));
    const dataRows = rows.slice(1);

    const categories = dataRows.map(r => r[0]);
    const values = dataRows.map(r => Number(r[1]));

    const avg = (values.reduce((a,b) => a+b, 0) / values.length).toFixed(1);

    document.getElementById("avgDisplay").innerHTML = `
      ${avg}%
      <div class="center-sub">Average</div>
    `;

    const options = {
      series: [{
        name: "Grades",
        data: values
      }],
      chart: {
        type: 'radar',
        height: '100%',
        background: 'transparent',
        toolbar: { show: false },
        animations: {
          enabled: true,
          animateGradually: { enabled: true },
          dynamicAnimation: { enabled: true }
        }
      },
      stroke: {
        width: 3,
        colors: [currentColor]
      },
      fill: {
        type: 'gradient',
        gradient: {
          shade: 'dark',
          type: 'vertical',
          shadeIntensity: 0.4,
          gradientToColors: [currentColor],
          opacityFrom: 0.6,
          opacityTo: 0.25
        }
      },
      markers: {
        size: 6,
        colors: ['#ffffff'],
        strokeColor: currentColor,
        strokeWidth: 3
      },
      xaxis: {
        categories: categories,
        labels: {
          style: {
            colors: "#e5e5e5",
            fontSize: "16px"
          }
        }
      },
      yaxis: {
        min: 0,
        max: 100,
        tickAmount: 5,
        labels: {
          style: {
            colors: "#555555"
          }
        }
      },
      grid: {
        borderColor: "#2a2a2a"
      },
      plotOptions: {
        radar: {
          polygons: {
            strokeColors: "#333333",
            connectorColors: "#333333"
          }
        }
      }
    };

    chart = new ApexCharts(document.querySelector("#chart"), options);
    chart.render();

    setTimeout(() => {
      window.location.reload();
    }, 15000);
  });

function changeColor(color) {
  currentColor = color;
  chart.updateOptions({
    stroke: { colors: [color] },
    fill: {
      gradient: {
        gradientToColors: [color]
      }
    },
    markers: {
      strokeColor: color
    }
  });
}
</script>

</body>
</html>
