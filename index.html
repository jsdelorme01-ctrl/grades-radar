<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grades Radar</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #191919;
    width: 100%;
    height: 100%;
    display: flex;
    font-family: Inter, sans-serif;
  }

  #chart { flex: 1; }

  .center-metric {
    position: absolute;
    color: #ffffff;
    font-size: 28px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    transition: transform 0.3s ease;
  }

  .center-sub {
    font-size: 13px;
    color: #a3a3a3;
    font-weight: 400;
  }

  .pulse {
    animation: pulseAnim 1.5s infinite;
  }

  @keyframes pulseAnim {
    0% { transform: translateY(-50%) scale(1); }
    50% { transform: translateY(-50%) scale(1.05); }
    100% { transform: translateY(-50%) scale(1); }
  }

  .color-switcher {
    position: absolute;
    top: 14px;
    left: 14px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  .color-btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .color-btn:hover {
    transform: scale(1.2);
    box-shadow: 0 0 6px currentColor;
  }

  .green { background: #22c55e; }
  .red { background: #ef4444; }
  .purple { background: #ff2bd6; }

</style>
</head>

<body>

<div class="color-switcher">
  <div class="color-btn green" onclick="changeColor('#22c55e')"></div>
  <div class="color-btn red" onclick="changeColor('#ef4444')"></div>
  <div class="color-btn purple" onclick="changeColor('#ff2bd6')"></div>
</div>

<div id="chart"></div>
<div class="center-metric" id="avgDisplay"></div>

<script>
let chart;
let previousValues = [];
let rawValues = [];
let categoriesGlobal = [];
let hiddenIndexes = new Set();
let currentColor = localStorage.getItem("radarColor") || "#22c55e";

fetchData();

function fetchData() {
  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQa8Fy_R1PkzQFQw18xtwyB52qyBG5kLpz21CHdTDL5oJpDVcXuNSURvY9_pmphs2gC7mucEU_wpDde/pub?output=csv&t=" + new Date().getTime())
    .then(response => response.text())
    .then(data => {

      const rows = data.trim().split("\n").map(r => r.split(","));
      const dataRows = rows.slice(1);

      categoriesGlobal = dataRows.map(r => r[0]);
      rawValues = dataRows.map(r => Number(r[1]));

      updateChart();
    });
}

function updateChart() {
  const values = rawValues.map((v, i) =>
    hiddenIndexes.has(i) ? 0 : v
  );

  const activeValues = rawValues.filter((_, i) => !hiddenIndexes.has(i));

  const avg = activeValues.length
    ? (activeValues.reduce((a,b) => a+b, 0) / activeValues.length).toFixed(1)
    : 0;

  const avgDisplay = document.getElementById("avgDisplay");
  avgDisplay.innerHTML = `
    ${avg}%
    <div class="center-sub">Average</div>
  `;

  if (avg > 90) avgDisplay.classList.add("pulse");
  else avgDisplay.classList.remove("pulse");

  if (!chart) {
    createChart(values);
  } else {
    chart.updateSeries([{ data: values }]);
  }
}

function createChart(values) {
  const options = {
    series: [{ name: "Grades", data: values }],
    chart: {
      type: 'radar',
      height: '100%',
      background: 'transparent',
      toolbar: { show: false },
      events: {
        markerClick: function(event, chartContext, { dataPointIndex }) {
          if (hiddenIndexes.has(dataPointIndex))
            hiddenIndexes.delete(dataPointIndex);
          else
            hiddenIndexes.add(dataPointIndex);

          updateChart();
        }
      }
    },
    stroke: {
      width: 3,
      colors: [currentColor]
    },
    fill: {
      opacity: 0.4,
      colors: [currentColor]
    },
    markers: {
      size: 6,
      colors: ['#ffffff'],
      strokeColor: currentColor,
      strokeWidth: 3
    },
    xaxis: {
      categories: categoriesGlobal,
      labels: {
        style: {
          colors: "#e5e5e5",
          fontSize: "16px"
        }
      }
    },
    yaxis: {
      min: 0,
      max: 100,
      tickAmount: 5,
      labels: {
        style: { colors: "#555555" }
      }
    },
    grid: {
      borderColor: "#2a2a2a"
    },
    plotOptions: {
      radar: {
        polygons: {
          strokeColors: "#333333",
          connectorColors: "#333333"
        }
      }
    }
  };

  chart = new ApexCharts(document.querySelector("#chart"), options);
  chart.render();
}

function changeColor(color) {
  currentColor = color;
  localStorage.setItem("radarColor", color);

  chart.updateOptions({
    stroke: { colors: [color] },
    fill: { colors: [color] },
    markers: { strokeColor: color }
  });
}

setInterval(fetchData, 15000);
</script>

</body>
</html>
