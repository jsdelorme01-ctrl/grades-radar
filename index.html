<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grades Radar</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  background-color: #191919;
  width: 100%;
  height: 100%;
  display: flex;
  font-family: Inter, sans-serif;
  position: relative;
}

#chart {
  width: 100%;
  height: 100%;
}

/* ===== Center Metric ===== */
.center-metric {
  position: absolute;
  color: #ffffff;
  font-size: 32px;
  font-weight: 600;
  text-align: center;
  width: 100%;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}

.center-sub {
  font-size: 14px;
  color: #cfcfcf;
  font-weight: 400;
}

/* ===== Glow ===== */
.glow-burst {
  animation: glowAnim 1.2s ease-out;
}

@keyframes glowAnim {
  0%   { text-shadow: 0 0 0px currentColor; }
  40%  { text-shadow: 0 0 18px currentColor; }
  100% { text-shadow: 0 0 0px currentColor; }
}

/* ===== Ripple ===== */
.ripple {
  position: absolute;
  top: 50%;
  left: 50%;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  border: 2px solid currentColor;
  pointer-events: none;
  animation: rippleAnim 1.2s ease-out forwards;
}

@keyframes rippleAnim {
  0%   { width: 10px; height: 10px; opacity: 0.6; }
  100% { width: 500px; height: 500px; opacity: 0; }
}

/* ===== Color Buttons ===== */
.color-switcher {
  position: absolute;
  top: 14px;
  left: 14px;
  display: flex;
  gap: 10px;
  z-index: 10;
}

.color-btn {
  width: 14px;
  height: 14px;
  border-radius: 50%;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.color-btn:hover {
  transform: scale(1.2);
  box-shadow: 0 0 8px currentColor;
}

.green { background: #22c55e; }
.red { background: #ef4444; }
.purple { background: #ff2bd6; }

</style>
</head>

<body>

<div class="color-switcher">
  <div class="color-btn green" onclick="changeColor('#22c55e')"></div>
  <div class="color-btn red" onclick="changeColor('#ef4444')"></div>
  <div class="color-btn purple" onclick="changeColor('#ff2bd6')"></div>
</div>

<div id="chart"></div>
<div class="center-metric" id="avgDisplay"></div>

<script>

let chart;
let previousValues = [];
let candidateValues = [];
let stableCount = 0;
let currentColor = localStorage.getItem("radarColor") || "#22c55e";

fetchData();
setInterval(fetchData, 2000); // 2 sec polling

function fetchData() {
  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQa8Fy_R1PkzQFQw18xtwyB52qyBG5kLpz21CHdTDL5oJpDVcXuNSURvY9_pmphs2gC7mucEU_wpDde/pub?output=csv&t=" + Date.now())
    .then(res => res.text())
    .then(data => {

      const rows = data.trim().split("\n").map(r => r.split(","));
      const dataRows = rows.slice(1);

      const categories = dataRows.map(r => r[0].trim());
      const values = dataRows.map(r => parseFloat(r[1]) || 0);

      if (!chart) {
        previousValues = [...values];
        createChart(categories, values);
        updateAverage(values);
        return;
      }

      const changed =
        previousValues.length !== values.length ||
        values.some((v,i)=>v!==previousValues[i]);

      if (!changed) {
        stableCount = 0;
        return;
      }

      if (JSON.stringify(values) === JSON.stringify(candidateValues)) {
        stableCount++;
      } else {
        candidateValues = [...values];
        stableCount = 1;
      }

      if (stableCount >= 3) {
        stableCount = 0;
        previousValues = [...values];

        chart.updateOptions({
          chart: {
            animations: {
              enabled: true,
              easing: 'easeinout',
              speed: 1200
            }
          },
          xaxis: { categories }
        });

        chart.updateSeries([{ data: values }]);
        updateAverage(values);
        triggerEffects();
      }
    });
}

function updateAverage(values) {
  const avg = (values.reduce((a,b)=>a+b,0)/values.length).toFixed(1);
  document.getElementById("avgDisplay").innerHTML =
    `${avg}%<div class="center-sub">Average</div>`;
}

function triggerEffects() {
  const el = document.getElementById("avgDisplay");

  el.style.color = currentColor;
  el.classList.add("glow-burst");

  setTimeout(()=>{
    el.classList.remove("glow-burst");
    el.style.color = "#ffffff";
  },1200);

  const ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.color = currentColor;
  document.body.appendChild(ripple);

  setTimeout(()=> ripple.remove(),1200);
}

function createChart(categories, values) {
  chart = new ApexCharts(document.querySelector("#chart"), {
    series: [{ data: values }],
    chart: {
      type: 'radar',
      height: '100%',
      background: 'transparent',
      animations: { enabled: false }
    },
    stroke: { width: 3, colors: [currentColor] },
    fill: {
      type: 'gradient',
      gradient: {
        shade: 'dark',
        type: 'vertical',
        gradientToColors: [currentColor],
        opacityFrom: 0.6,
        opacityTo: 0.25
      }
    },
    markers: {
      size: 6,
      colors: ['#ffffff'],
      strokeColor: currentColor,
      strokeWidth: 3
    },
    xaxis: {
      categories,
      labels: { style: { colors:"#e5e5e5", fontSize:"16px" } }
    },
    yaxis: {
      min:0,
      max:100,
      tickAmount:5,
      labels: { style: { colors:"#cccccc" } }
    },
    grid: { borderColor:"#444444" }, /* Lighter inner lines */
    plotOptions: {
      radar: {
        polygons: {
          strokeColors: "#555555",  /* Lighter inner rings */
          connectorColors: "#555555"
        }
      }
    }
  });

  chart.render();
}

function changeColor(color) {
  currentColor = color;
  localStorage.setItem("radarColor", color);

  chart.updateOptions({
    stroke: { colors: [color] },
    fill: { gradient: { gradientToColors: [color] } },
    markers: { strokeColor: color }
  });
}

</script>
</body>
</html>
