<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grades Radar</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #191919;
    width: 100%;
    height: 100%;
    display: flex;
  }

  #chart {
    flex: 1;
  }
</style>
</head>

<body>

<div id="chart"></div>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQa8Fy_R1PkzQFQw18xtwyB52qyBG5kLpz21CHdTDL5oJpDVcXuNSURvY9_pmphs2gC7mucEU_wpDde/pub?output=csv&t=" + new Date().getTime())
  .then(response => response.text())
  .then(data => {

    const rows = data.trim().split("\n").map(r => r.split(","));
    const dataRows = rows.slice(1);

    const categories = dataRows.map(r => r[0]);
    const values = dataRows.map(r => Number(r[1]));

    var options = {
      series: [{
        name: "Grade %",
        data: values
      }],
      chart: {
        type: 'radar',
        height: '100%',
        width: '100%',
        background: 'transparent',
        toolbar: { show: false }
      },
      stroke: {
        width: 3,
        colors: ['#ff2bd6']
      },
      fill: {
        opacity: 0.45,
        colors: ['#f5d0fe']
      },
      markers: {
        size: 6,
        colors: ['#ffffff'],
        strokeColor: '#ff2bd6',
        strokeWidth: 2
      },
      xaxis: {
        categories: categories,
        labels: {
          style: {
            colors: "#e5e5e5",
            fontSize: "16px"
          }
        }
      },
      yaxis: {
        min: 0,
        max: 100,
        tickAmount: 5,
        labels: {
          style: {
            colors: "#a3a3a3"
          }
        }
      },
      grid: {
        borderColor: "#9333ea"
      },
      plotOptions: {
        radar: {
          size: undefined,
          polygons: {
            strokeColors: "#9333ea",
            connectorColors: "#9333ea"
          }
        }
      }
    };

    var chart = new ApexCharts(document.querySelector("#chart"), options);
    chart.render();
  });
</script>

</body>
</html>
