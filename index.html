<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grades Radar</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #191919; /* Matches Notion dark */
    width: 100%;
    height: 100%;
  }

  #chart {
    width: 100vw;
    height: 100vh;
  }
</style>
</head>

<body>

<div id="chart"></div>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQa8Fy_R1PkzQFQw18xtwyB52qyBG5kLpz21CHdTDL5oJpDVcXuNSURvY9_pmphs2gC7mucEU_wpDde/pub?output=csv&t=" + new Date().getTime())
  .then(response => response.text())
  .then(data => {

    const rows = data.trim().split("\n").map(r => r.split(","));
    const dataRows = rows.slice(1);

    const categories = dataRows.map(r => r[0]);
    const values = dataRows.map(r => Number(r[1]));

    var options = {
      series: [{
        name: "Grade %",
        data: values
      }],
      chart: {
        type: 'radar',
        height: '100%',
        background: 'transparent',
        toolbar: { show: false }
      },
      stroke: {
        width: 3,
        colors: ['#3b82f6']
      },
      fill: {
        opacity: 0.35,
        colors: ['#3b82f6']
      },
      markers: {
        size: 6,
        colors: ['#3b82f6']
      },
      xaxis: {
        categories: categories,
        labels: {
          style: {
            colors: "#d4d4d4",
            fontSize: "15px",
            fontFamily: "Inter, sans-serif"
          }
        }
      },
      yaxis: {
        min: 0,
        max: 100,
        tickAmount: 5,
        labels: {
          style: {
            colors: "#a3a3a3"
          }
        }
      },
      grid: {
        borderColor: "#2a2a2a"
      }
    };

    var chart = new ApexCharts(document.querySelector("#chart"), options);
    chart.render();
  });
</script>

</body>
</html>
