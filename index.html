<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grades Radar</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #191919;
  width: 100%;
  height: 100%;
  display: flex;
  font-family: Inter, sans-serif;
}

#chart { flex: 1; }

.center-metric {
  position: absolute;
  color: #ffffff;
  font-size: 28px;
  font-weight: 600;
  text-align: center;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
}

.center-sub {
  font-size: 13px;
  color: #a3a3a3;
}

.pulse {
  animation: pulseAnim 1.5s infinite;
}

@keyframes pulseAnim {
  0% { transform: translateY(-50%) scale(1); }
  50% { transform: translateY(-50%) scale(1.06); }
  100% { transform: translateY(-50%) scale(1); }
}

.subject-list {
  position: absolute;
  top: 14px;
  right: 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 13px;
}

.subject-item {
  cursor: pointer;
  color: #e5e5e5;
  opacity: 1;
  transition: opacity 0.2s ease;
}

.subject-item.hidden {
  opacity: 0.35;
}

</style>
</head>

<body>

<div class="subject-list" id="subjectList"></div>

<div id="chart"></div>
<div class="center-metric" id="avgDisplay"></div>

<script>
let chart;
let rawValues = [];
let categories = [];
let hidden = new Set();
let currentColor = "#22c55e";

fetchData();

function fetchData() {
  fetch("YOUR_CSV_LINK&t=" + Date.now())
    .then(r => r.text())
    .then(data => {
      const rows = data.trim().split("\n").map(r => r.split(","));
      const dataRows = rows.slice(1);

      categories = dataRows.map(r => r[0]);
      rawValues = dataRows.map(r => Number(r[1]));

      buildSubjectList();
      updateChart();
    });
}

function buildSubjectList() {
  const container = document.getElementById("subjectList");
  container.innerHTML = "";

  categories.forEach((name, i) => {
    const div = document.createElement("div");
    div.className = "subject-item";
    div.innerText = name;

    div.onclick = () => {
      if (hidden.has(i)) hidden.delete(i);
      else hidden.add(i);

      div.classList.toggle("hidden");
      updateChart();
    };

    container.appendChild(div);
  });
}

function updateChart() {

  const visibleValues = rawValues.map((v,i) =>
    hidden.has(i) ? 0 : v
  );

  const activeValues = rawValues.filter((_,i)=>!hidden.has(i));

  const avg = activeValues.length
    ? (activeValues.reduce((a,b)=>a+b,0)/activeValues.length).toFixed(1)
    : 0;

  const avgDisplay = document.getElementById("avgDisplay");
  avgDisplay.innerHTML = `${avg}%<div class="center-sub">Average</div>`;

  if (avg > 90) avgDisplay.classList.add("pulse");
  else avgDisplay.classList.remove("pulse");

  if (!chart) {
    chart = new ApexCharts(document.querySelector("#chart"), {
      series: [{ data: visibleValues }],
      chart: {
        type: 'radar',
        height: '100%',
        background: 'transparent',
        toolbar: { show: false }
      },
      stroke: {
        width: 3,
        colors: [currentColor]
      },
      fill: {
        opacity: 0.4,
        colors: [currentColor]
      },
      markers: {
        size: 6,
        colors: ['#ffffff'],
        strokeColor: currentColor,
        strokeWidth: 3
      },
      xaxis: { categories: categories },
      yaxis: { min: 0, max: 100 }
    });
    chart.render();
  } else {
    chart.updateSeries([{ data: visibleValues }]);
  }
}

setInterval(fetchData, 15000);
</script>

</body>
</html>
