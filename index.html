<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grades Radar</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background-color: #191919;
    width: 100%;
    height: 100%;
    display: flex;
    font-family: Inter, sans-serif;
  }

  #chart { flex: 1; }

  .center-metric {
    position: absolute;
    color: #ffffff;
    font-size: 28px;
    font-weight: 600;
    text-align: center;
    width: 100%;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
  }

  .center-sub {
    font-size: 13px;
    color: #a3a3a3;
  }

  .pulse {
    animation: pulseAnim 1.5s infinite;
  }

  @keyframes pulseAnim {
    0% { transform: translateY(-50%) scale(1); }
    50% { transform: translateY(-50%) scale(1.06); }
    100% { transform: translateY(-50%) scale(1); }
  }

  .color-switcher {
    position: absolute;
    top: 14px;
    left: 14px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }

  .color-btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    cursor: pointer;
  }

  .green { background: #22c55e; }
  .red { background: #ef4444; }
  .purple { background: #ff2bd6; }

</style>
</head>

<body>

<div class="color-switcher">
  <div class="color-btn green" onclick="changeColor('#22c55e')"></div>
  <div class="color-btn red" onclick="changeColor('#ef4444')"></div>
  <div class="color-btn purple" onclick="changeColor('#ff2bd6')"></div>
</div>

<div id="chart"></div>
<div class="center-metric" id="avgDisplay"></div>

<script>
let chart;
let rawValues = [];
let categoriesGlobal = [];
let hiddenIndexes = new Set();
let currentColor = localStorage.getItem("radarColor") || "#22c55e";

fetchData();

function fetchData() {
  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQa8Fy_R1PkzQFQw18xtwyB52qyBG5kLpz21CHdTDL5oJpDVcXuNSURvY9_pmphs2gC7mucEU_wpDde/pub?output=csv&t=" + new Date().getTime())
    .then(res => res.text())
    .then(data => {

      const rows = data.trim().split("\n").map(r => r.split(","));
      const dataRows = rows.slice(1);

      categoriesGlobal = dataRows.map(r => r[0]);
      rawValues = dataRows.map(r => Number(r[1]));

      updateChart();
    });
}

function updateChart() {

  const visibleValues = rawValues.map((v,i)=>
    hiddenIndexes.has(i) ? null : v
  );

  const activeValues = rawValues.filter((_,i)=>!hiddenIndexes.has(i));

  const avg = activeValues.length
    ? (activeValues.reduce((a,b)=>a+b,0)/activeValues.length).toFixed(1)
    : 0;

  const avgDisplay = document.getElementById("avgDisplay");
  avgDisplay.innerHTML = `${avg}%<div class="center-sub">Average</div>`;

  if (avg > 90) avgDisplay.classList.add("pulse");
  else avgDisplay.classList.remove("pulse");

  if (!chart) createChart(visibleValues);
  else chart.updateSeries([{ data: visibleValues }]);

  updateLabelStyles();
}

function createChart(values) {

  chart = new ApexCharts(document.querySelector("#chart"), {
    series: [{ data: values }],
    chart: {
      type: 'radar',
      height: '100%',
      background: 'transparent',
      toolbar: { show: false }
    },
    stroke: { width: 3, colors: [currentColor] },
    fill: { opacity: 0.4, colors: [currentColor] },
    markers: {
      size: 6,
      colors: ['#ffffff'],
      strokeColor: currentColor,
      strokeWidth: 3
    },
    xaxis: {
      categories: categoriesGlobal,
      labels: {
        style: {
          colors: "#e5e5e5",
          fontSize: "16px"
        }
      }
    },
    yaxis: {
      min: 0,
      max: 100,
      tickAmount: 5,
      labels: { style: { colors: "#555" } }
    },
    grid: { borderColor: "#2a2a2a" }
  });

  chart.render().then(()=>{
    makeLabelsClickable();
  });
}

function makeLabelsClickable() {
  const labels = document.querySelectorAll('.apexcharts-xaxis text');

  labels.forEach((label, index) => {
    label.style.cursor = "pointer";
    label.onclick = () => {
      if (hiddenIndexes.has(index)) hiddenIndexes.delete(index);
      else hiddenIndexes.add(index);
      updateChart();
    };
  });
}

function updateLabelStyles() {
  const labels = document.querySelectorAll('.apexcharts-xaxis text');
  labels.forEach((label, i)=>{
    label.style.fill = hiddenIndexes.has(i) ? "#444" : "#e5e5e5";
  });
}

function changeColor(color) {
  currentColor = color;
  localStorage.setItem("radarColor", color);
  chart.updateOptions({
    stroke: { colors: [color] },
    fill: { colors: [color] },
    markers: { strokeColor: color }
  });
}

setInterval(fetchData, 15000);
</script>

</body>
</html>
