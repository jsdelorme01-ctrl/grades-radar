<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Grades Radar</title>
<script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background-color: #191919;
  width: 100%;
  height: 100%;
  display: flex;
  font-family: Inter, sans-serif;
}

#chart { flex: 1; }

.center-metric {
  position: absolute;
  color: #ffffff;
  font-size: 28px;
  font-weight: 600;
  text-align: center;
  width: 100%;
  top: 50%;
  transform: translateY(-50%);
  pointer-events: none;
  transition: all 0.4s ease;
}

.center-sub {
  font-size: 13px;
  color: #a3a3a3;
}

.glow-low { text-shadow: 0 0 6px rgba(245,158,11,0.4); }
.glow-high { text-shadow: 0 0 12px rgba(34,197,94,0.8); }

.goal-toggle {
  position: absolute;
  top: 14px;
  right: 14px;
  font-size: 12px;
  color: #aaa;
  cursor: pointer;
  user-select: none;
}

.goal-toggle.active {
  color: #ffffff;
}

</style>
</head>

<body>

<div class="goal-toggle" onclick="toggleGoalMode()" id="goalToggle">
  Goal Mode
</div>

<div id="chart"></div>
<div class="center-metric" id="avgDisplay"></div>

<script>
let chart;
let previousValues = [];
let goalMode = false;
let currentColor = "#22c55e";

fetchData();

function fetchData() {
  fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vQa8Fy_R1PkzQFQw18xtwyB52qyBG5kLpz21CHdTDL5oJpDVcXuNSURvY9_pmphs2gC7mucEU_wpDde/pub?output=csv&t=" + Date.now())
    .then(r => r.text())
    .then(data => {

      const rows = data.trim().split("\n").map(r => r.split(","));
      const dataRows = rows.slice(1);

      const categories = dataRows.map(r => r[0]);
      const values = dataRows.map(r => Number(r[1]));

      const avg = (values.reduce((a,b)=>a+b,0)/values.length).toFixed(1);

      const avgDisplay = document.getElementById("avgDisplay");
      avgDisplay.innerHTML = `${avg}%<div class="center-sub">Average</div>`;

      avgDisplay.classList.remove("glow-low","glow-high");

      if (avg >= 90) avgDisplay.classList.add("glow-high");
      else if (avg >= 75) avgDisplay.classList.add("glow-low");

      if (!chart) {
        createChart(categories, values);
      } else {
        if (JSON.stringify(values) !== JSON.stringify(previousValues)) {
          chart.updateSeries([{ data: values }]);
        }
      }

      previousValues = values;
    });
}

function createChart(categories, values) {

  chart = new ApexCharts(document.querySelector("#chart"), {
    series: [
      {
        name: "Grades",
        data: values
      },
      {
        name: "Goal",
        data: new Array(values.length).fill(95)
      }
    ],
    chart: {
      type: 'radar',
      height: '100%',
      background: 'transparent',
      toolbar: { show: false },
      animations: { enabled: false }
    },
    stroke: {
      width: [3, 2],
      dashArray: [0, 6],
      colors: ["#22c55e", "#888888"]
    },
    fill: {
      type: ['gradient','solid'],
      gradient: {
        shade: 'dark',
        type: 'radial',
        shadeIntensity: 0.5,
        gradientToColors: ["#22c55e"],
        opacityFrom: 0.7,
        opacityTo: 0.25
      },
      opacity: [0.6, 0]
    },
    markers: {
      size: 6,
      colors: ['#ffffff'],
      strokeColor: "#22c55e",
      strokeWidth: 3
    },
    xaxis: {
      categories: categories,
      labels: {
        style: {
          colors: "#e5e5e5",
          fontSize: "16px",
          fontWeight: 500,
          letterSpacing: "0.5px"
        }
      }
    },
    yaxis: {
      min: 0,
      max: 100,
      tickAmount: 5,
      labels: { style: { colors: "#444" } }
    },
    grid: {
      borderColor: "#2a2a2a"
    },
    plotOptions: {
      radar: {
        polygons: {
          strokeColors: ["rgba(239,68,68,0.05)",
                         "rgba(245,158,11,0.05)",
                         "rgba(34,197,94,0.05)",
                         "rgba(34,197,94,0.05)",
                         "rgba(34,197,94,0.05)"],
          fill: { colors: ["transparent"] }
        }
      }
    },
    legend: { show: false }
  });

  chart.render();
}

function toggleGoalMode() {
  goalMode = !goalMode;
  const toggle = document.getElementById("goalToggle");
  toggle.classList.toggle("active");

  chart.updateOptions({
    stroke: {
      colors: goalMode ? ["#ffffff", "#ffffff"] : ["#22c55e","#888888"]
    },
    fill: {
      gradient: {
        gradientToColors: goalMode ? ["#ffffff"] : ["#22c55e"]
      }
    }
  });
}

setInterval(fetchData, 15000);
</script>

</body>
</html>
